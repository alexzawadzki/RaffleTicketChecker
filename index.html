<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee&family=Archivo:wght@400;600;700;800&display=swap');

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ---------- ticket roll colors ----------

const COLORS = [
  { id: null, name: "No color", bg: "#F6EEDB", fg: "#231A02" },
  { id: "red", name: "Red", bg: "#E04848", fg: "#FFFFFF" },
  { id: "orange", name: "Orange", bg: "#F77F00", fg: "#231A02" },
  { id: "yellow", name: "Yellow", bg: "#F8D346", fg: "#231A02" },
  { id: "green", name: "Green", bg: "#2BB673", fg: "#FFFFFF" },
  { id: "blue", name: "Blue", bg: "#2D6CDF", fg: "#FFFFFF" },
  { id: "purple", name: "Purple", bg: "#8B5CF6", fg: "#FFFFFF" },
  { id: "pink", name: "Pink", bg: "#F273B6", fg: "#231A02" },
  { id: "white", name: "White", bg: "#FFFFFF", fg: "#231A02" },
];

const colorOf = (id) => COLORS.find((c) => c.id === id) || COLORS[0];

// ---------- helpers ----------

const normalize = (raw) => {
  const t = String(raw).trim().toUpperCase();
  if (!t) return null;
  if (/^\d+$/.test(t)) return String(parseInt(t, 10));
  if (/^[A-Z0-9-]+$/.test(t)) return t;
  return null;
};

const parseTicketInput = (raw) => {
  const tokens = raw.split(/[\s,;]+/).filter(Boolean);
  const nums = [];
  const errors = [];
  for (const tok of tokens) {
    const range = tok.match(/^(\d+)-(\d+)$/);
    if (range) {
      let a = parseInt(range[1], 10);
      let b = parseInt(range[2], 10);
      if (a > b) { const tmp = a; a = b; b = tmp; }
      if (b - a > 5000) {
        errors.push(tok + " (range too large)");
        continue;
      }
      for (let i = a; i <= b; i++) nums.push(String(i));
    } else {
      const n = normalize(tok);
      if (n) nums.push(n);
      else errors.push(tok);
    }
  }
  return { nums, errors };
};

const keyOf = (t) => (t.c == null ? "none" : t.c) + "|" + t.n;

// group consecutive numbers within each color
const groupTickets = (tickets) => {
  const byColor = {};
  for (const t of tickets) {
    const k = t.c == null ? "none" : t.c;
    if (!byColor[k]) byColor[k] = [];
    byColor[k].push(t.n);
  }
  const groups = [];
  for (const colorDef of COLORS) {
    const k = colorDef.id == null ? "none" : colorDef.id;
    const list = byColor[k];
    if (!list) continue;
    const numeric = list
      .filter((n) => /^\d+$/.test(n))
      .map(Number)
      .sort((a, b) => a - b);
    const alpha = list.filter((n) => !/^\d+$/.test(n)).sort();
    let start = null;
    let prev = null;
    const push = () => {
      if (start === null) return;
      groups.push(
        start === prev
          ? { type: "single", value: String(start), c: colorDef.id }
          : { type: "range", from: start, to: prev, c: colorDef.id }
      );
    };
    for (const n of numeric) {
      if (start === null) { start = n; prev = n; continue; }
      if (n === prev + 1) { prev = n; continue; }
      push();
      start = n;
      prev = n;
    }
    push();
    for (const a of alpha) groups.push({ type: "single", value: a, c: colorDef.id });
  }
  return groups;
};

// ---------- palette ----------

const C = {
  bg: "#11182B",
  panel: "#1B2335",
  panelEdge: "#28324B",
  cream: "#F6EEDB",
  red: "#D7263D",
  gold: "#FFC53D",
  muted: "#8A93A8",
  miss: "#2A3349",
};

const STORAGE_KEY = "raffle-checker-data";

// coerce a ticket/winner array into {n, c} objects (old saves used strings)
const coerceTickets = (arr) => {
  let t = Array.isArray(arr) ? arr : [];
  if (t.length && typeof t[0] === "string") t = t.map((n) => ({ n, c: null }));
  return t;
};
// coerce a history array, backfilling the color field added in a later version
const coerceHistory = (arr) =>
  (Array.isArray(arr) ? arr : []).map((x) =>
    x.color === undefined ? Object.assign({}, x, { color: null }) : x
  );

// accept any saved/imported blob and coerce it into the current shape.
// 50/50 fields default to empty so saves/backups from before 50/50 still load.
const normalizeState = (d) => {
  if (!d || typeof d !== "object") throw new Error("not an object");
  return {
    tickets: coerceTickets(d.tickets),
    winners: coerceTickets(d.winners),
    history: coerceHistory(d.history),
    fiftyTickets: coerceTickets(d.fiftyTickets),
    fiftyWinners: coerceTickets(d.fiftyWinners),
    fiftyHistory: coerceHistory(d.fiftyHistory),
  };
};

const loadSaved = () => {
  try {
    const v = localStorage.getItem(STORAGE_KEY);
    if (!v) return null;
    return normalizeState(JSON.parse(v));
  } catch (e) {
    return null;
  }
};

// backup code: JSON -> base64. All ticket data is ASCII (see normalize),
// so plain btoa/atob is safe and keeps the code copy-pasteable anywhere.
const encodeBackup = (s) =>
  btoa(
    JSON.stringify({
      tickets: s.tickets,
      winners: s.winners,
      history: s.history,
      fiftyTickets: s.fiftyTickets,
      fiftyWinners: s.fiftyWinners,
      fiftyHistory: s.fiftyHistory,
    })
  );

const decodeBackup = (code) => normalizeState(JSON.parse(atob(String(code).trim())));

// ---------- color picker ----------

function ColorPicker({ value, onChange, label }) {
  return (
    <div>
      <div
        style={{
          fontFamily: "'Archivo', sans-serif",
          fontWeight: 700,
          color: C.muted,
          fontSize: "12px",
          letterSpacing: "1px",
          textTransform: "uppercase",
        }}
      >
        {label}
      </div>
      <div className="flex flex-wrap gap-2 mt-2">
        {COLORS.map((c) => {
          const selected = value === c.id;
          return (
            <button
              key={c.id == null ? "none" : c.id}
              onClick={() => onChange(c.id)}
              aria-label={c.name}
              aria-pressed={selected}
              className="rounded-full"
              style={{
                width: 34,
                height: 34,
                background: c.bg,
                border: c.id == null ? "2px dashed #9a917c" : "2px solid rgba(0,0,0,0.25)",
                boxShadow: selected ? "0 0 0 3px " + C.bg + ", 0 0 0 6px " + C.gold : "none",
                transition: "box-shadow 0.15s",
              }}
            />
          );
        })}
      </div>
      <div
        className="mt-1"
        style={{ fontFamily: "'Archivo', sans-serif", color: C.cream, fontSize: "13px", fontWeight: 600 }}
      >
        {colorOf(value).name}
      </div>
    </div>
  );
}

// ---------- ticket stub result ----------

function ResultStub({ result, plain, tag }) {
  if (!result) {
    return (
      <div
        className="rounded-2xl p-6 text-center"
        style={{
          background: C.panel,
          border: "2px dashed " + C.panelEdge,
          color: C.muted,
          fontFamily: "'Archivo', sans-serif",
        }}
      >
        {plain
          ? "Type the called number and hit Check."
          : "Pick the color being called, type the number, hit Check."}
      </div>
    );
  }

  const hit = result.hit;
  const callColor = colorOf(result.color);
  const bg = hit ? C.gold : C.miss;
  const fg = hit ? "#231A02" : C.muted;
  const label = hit ? "WINNER!" : "NOT YOURS";

  return (
    <div
      key={result.id}
      className="relative overflow-hidden rounded-2xl flex stub-pop"
      style={{ background: bg, boxShadow: hit ? "0 0 40px rgba(255,197,61,0.35)" : "none" }}
    >
      <div
        className="flex items-center justify-center px-3 py-6"
        style={{ borderRight: "3px dashed " + (hit ? "rgba(35,26,2,0.4)" : "rgba(17,24,43,0.8)") }}
      >
        <span
          style={{
            fontFamily: "'Bungee', sans-serif",
            color: fg,
            fontSize: "11px",
            writingMode: "vertical-rl",
            transform: "rotate(180deg)",
            letterSpacing: "2px",
            opacity: 0.7,
          }}
        >
          {tag || "RAFFLE"}
        </span>
      </div>
      <div
        className="absolute rounded-full"
        style={{ width: 22, height: 22, background: C.bg, left: 38, top: -11 }}
      />
      <div
        className="absolute rounded-full"
        style={{ width: 22, height: 22, background: C.bg, left: 38, bottom: -11 }}
      />
      <div className="flex-1 py-6 px-4 text-center">
        <div
          style={{
            fontFamily: "'Bungee', sans-serif",
            color: fg,
            fontSize: hit ? "34px" : "24px",
            lineHeight: 1.1,
          }}
        >
          {label}
        </div>
        <div className="flex items-center justify-center gap-2 mt-1">
          {!plain && (
            <span
              className="rounded-full inline-block"
              style={{
                width: 16,
                height: 16,
                background: callColor.bg,
                border: result.color == null ? "2px dashed #9a917c" : "2px solid rgba(0,0,0,0.25)",
              }}
            />
          )}
          <span
            style={{
              fontFamily: "'Archivo', sans-serif",
              fontWeight: 800,
              fontVariantNumeric: "tabular-nums",
              color: fg,
              fontSize: "28px",
            }}
          >
            {plain ? "#" + result.num : callColor.name.toUpperCase() + " #" + result.num}
          </span>
        </div>
        <div
          style={{
            fontFamily: "'Archivo', sans-serif",
            color: fg,
            opacity: 0.75,
            fontSize: "13px",
            marginTop: "2px",
          }}
        >
          {hit ? "You hold this ticket" : "Not in your tickets"}
        </div>
      </div>
    </div>
  );
}

// ---------- small ticket chip ----------

function TicketChip({ colorId, text, onRemove, extra, plain }) {
  const c = colorOf(colorId);
  return (
    <span
      className="rounded-lg pl-3 py-1 inline-flex items-center gap-1h"
      style={{
        paddingRight: onRemove ? 4 : 12,
        background: c.bg,
        color: c.fg,
        border:
          !plain && colorId == null ? "1px dashed #9a917c" : "1px solid rgba(0,0,0,0.2)",
        fontFamily: "'Archivo', sans-serif",
        fontWeight: 700,
        fontVariantNumeric: "tabular-nums",
        fontSize: "14px",
      }}
    >
      {text}
      {extra && <span style={{ fontWeight: 600, fontSize: "11px", opacity: 0.6 }}>{extra}</span>}
      {onRemove && (
        <button
          onClick={onRemove}
          aria-label={"Remove " + text}
          className="rounded-md px-1h"
          style={{ color: c.fg, fontWeight: 800, fontSize: "14px", opacity: 0.7 }}
        >
          ✕
        </button>
      )}
    </span>
  );
}

// ---------- shared ticket-set logic ----------
// One self-contained draw: tickets you hold, winners, called history, and the
// last check result. Used for both the main raffle and the 50/50 (which just
// passes color = null everywhere). Keeps the two draws on one tested code path.
function useTicketSet(initial) {
  const [tickets, setTickets] = useState(initial.tickets);
  const [winners, setWinners] = useState(initial.winners);
  const [history, setHistory] = useState(initial.history);
  const [result, setResult] = useState(null);
  const checkRef = useRef(null);

  // returns a summary for the caller to turn into a message, or null if nothing parsed
  const add = (raw, color) => {
    const { nums, errors } = parseTicketInput(raw);
    if (nums.length === 0 && errors.length === 0) return null;
    const existing = new Set(tickets.map(keyOf));
    let added = 0;
    const next = tickets.slice();
    for (const n of nums) {
      const t = { n, c: color };
      if (!existing.has(keyOf(t))) {
        existing.add(keyOf(t));
        next.push(t);
        added++;
      }
    }
    setTickets(next);
    return { added, dup: nums.length - added, errors, color };
  };

  const removeGroup = (g) => {
    if (g.type === "single") {
      setTickets(tickets.filter((t) => !(t.n === g.value && t.c === g.c)));
    } else {
      const toRemove = new Set();
      for (let i = g.from; i <= g.to; i++) toRemove.add(String(i));
      setTickets(tickets.filter((t) => !(t.c === g.c && toRemove.has(t.n))));
    }
  };

  const clear = () => {
    setTickets([]);
    setWinners([]);
    setHistory([]);
    setResult(null);
  };

  // replace this set's contents (used by backup restore)
  const load = (s) => {
    setTickets(s.tickets);
    setWinners(s.winners);
    setHistory(s.history);
    setResult(null);
  };

  // "No color" on either side matches any color
  const matchTicket = (num, color) =>
    tickets.find((t) => t.n === num && (t.c === color || t.c == null || color == null));

  const check = (rawNum, color) => {
    const n = normalize(rawNum);
    if (!n) return;
    const match = matchTicket(n, color);
    const hit = !!match;
    const entry = { num: n, color, hit, id: Date.now() };
    setResult(entry);
    setHistory((h) => [entry].concat(h).slice(0, 300));
    if (hit) {
      setWinners((w) => (w.some((x) => keyOf(x) === keyOf(match)) ? w : [match].concat(w)));
    }
    if (checkRef.current) checkRef.current.focus();
  };

  return { tickets, winners, history, result, checkRef, add, removeGroup, clear, load, check };
}

// ---------- main app ----------

function RaffleChecker() {
  const saved = useRef(loadSaved()).current;
  const [tab, setTab] = useState(saved && saved.tickets.length > 0 ? "check" : "tickets");

  // two independent draws sharing one code path (see useTicketSet)
  const main = useTicketSet({
    tickets: saved ? saved.tickets : [],
    winners: saved ? saved.winners : [],
    history: saved ? saved.history : [],
  });
  const fifty = useTicketSet({
    tickets: saved ? saved.fiftyTickets : [],
    winners: saved ? saved.fiftyWinners : [],
    history: saved ? saved.fiftyHistory : [],
  });
  // re-expose the main draw under the names the main-raffle JSX already uses
  const { tickets, winners, history, result, checkRef } = main;

  const [addInput, setAddInput] = useState("");
  const [addColor, setAddColor] = useState(null);
  const [addMsg, setAddMsg] = useState(null);
  const [checkInput, setCheckInput] = useState("");
  const [checkColor, setCheckColor] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const [backupCode, setBackupCode] = useState("");
  const [restoreInput, setRestoreInput] = useState("");
  const [backupMsg, setBackupMsg] = useState(null);

  // 50/50 tab inputs (plain numbers, no color)
  const [fiftyAddInput, setFiftyAddInput] = useState("");
  const [fiftyAddMsg, setFiftyAddMsg] = useState(null);
  const [fiftyCheckInput, setFiftyCheckInput] = useState("");
  const [fiftyConfirmClear, setFiftyConfirmClear] = useState(false);

  // save on change (both draws together)
  useEffect(() => {
    try {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
          tickets,
          winners,
          history,
          fiftyTickets: fifty.tickets,
          fiftyWinners: fifty.winners,
          fiftyHistory: fifty.history,
        })
      );
    } catch (e) {
      console.error("Save failed", e);
    }
  }, [tickets, winners, history, fifty.tickets, fifty.winners, fifty.history]);

  const buildAddMsg = (res, withColor) => {
    const parts = [];
    if (res.added > 0)
      parts.push(
        "Added " +
          res.added +
          (withColor ? " " + colorOf(res.color).name.toLowerCase() : "") +
          " ticket" +
          (res.added === 1 ? "" : "s")
      );
    if (res.dup > 0) parts.push(res.dup + " duplicate(s) skipped");
    if (res.errors.length > 0) parts.push("Could not read: " + res.errors.join(", "));
    return parts.join(". ");
  };

  // ----- main raffle handlers -----
  const addTickets = () => {
    const res = main.add(addInput, addColor);
    if (!res) return;
    setAddInput("");
    setAddMsg(buildAddMsg(res, true));
  };
  const runCheck = () => {
    main.check(checkInput, checkColor);
    setCheckInput("");
  };
  const removeGroup = (g) => main.removeGroup(g);
  const clearAll = () => {
    main.clear();
    setConfirmClear(false);
  };

  // ----- 50/50 handlers (color always null) -----
  const addFifty = () => {
    const res = fifty.add(fiftyAddInput, null);
    if (!res) return;
    setFiftyAddInput("");
    setFiftyAddMsg(buildAddMsg(res, false));
  };
  const runFiftyCheck = () => {
    fifty.check(fiftyCheckInput, null);
    setFiftyCheckInput("");
  };
  const removeFiftyGroup = (g) => fifty.removeGroup(g);
  const clearFifty = () => {
    fifty.clear();
    setFiftyConfirmClear(false);
  };

  // reveal the backup code and try to copy it to the clipboard
  const makeBackup = async () => {
    const code = encodeBackup({
      tickets,
      winners,
      history,
      fiftyTickets: fifty.tickets,
      fiftyWinners: fifty.winners,
      fiftyHistory: fifty.history,
    });
    setBackupCode(code);
    try {
      await navigator.clipboard.writeText(code);
      setBackupMsg("Copied! Paste it into Notes or text it to yourself so you can't lose it.");
    } catch (e) {
      setBackupMsg("Select the code below and copy it, then save it somewhere safe.");
    }
  };

  const restoreBackup = () => {
    if (!restoreInput.trim()) return;
    try {
      const s = decodeBackup(restoreInput);
      main.load({ tickets: s.tickets, winners: s.winners, history: s.history });
      fifty.load({ tickets: s.fiftyTickets, winners: s.fiftyWinners, history: s.fiftyHistory });
      setRestoreInput("");
      setBackupMsg(
        "Restored " +
          s.tickets.length +
          " ticket" +
          (s.tickets.length === 1 ? "" : "s") +
          (s.fiftyTickets.length ? " + " + s.fiftyTickets.length + " 50/50" : "") +
          "."
      );
    } catch (e) {
      setBackupMsg("That code didn't look right — make sure you pasted the whole thing.");
    }
  };

  const groups = groupTickets(tickets);
  const fiftyGroups = groupTickets(fifty.tickets);
  const winCount = winners.length;

  const tabBtn = (id, label) => (
    <button
      onClick={() => setTab(id)}
      className="flex-1 py-3 rounded-xl text-sm"
      style={{
        fontFamily: "'Bungee', sans-serif",
        fontSize: "12px",
        letterSpacing: "1px",
        background: tab === id ? C.red : "transparent",
        color: tab === id ? C.cream : C.muted,
        border: tab === id ? "1px solid " + C.red : "1px solid " + C.panelEdge,
        transition: "all 0.15s",
      }}
    >
      {label}
    </button>
  );

  return (
    <div className="min-h-screen w-full" style={{ background: C.bg }}>
      <div className="max-w-md mx-auto px-4 pb-12 pt-6">
        {/* header */}
        <div className="text-center mb-5">
          <div
            style={{
              fontFamily: "'Bungee', sans-serif",
              color: C.cream,
              fontSize: "26px",
              lineHeight: 1.1,
            }}
          >
            RAFFLE <span style={{ color: C.gold }}>CHECKER</span>
          </div>
          <div
            style={{
              fontFamily: "'Archivo', sans-serif",
              color: C.muted,
              fontSize: "13px",
              marginTop: "4px",
            }}
          >
            {tickets.length} ticket{tickets.length === 1 ? "" : "s"} loaded
            {winCount > 0 ? " \u00B7 " + winCount + " win" + (winCount === 1 ? "" : "s") : ""}
            {fifty.tickets.length > 0 ? " \u00B7 " + fifty.tickets.length + " 50/50" : ""}
          </div>
        </div>

        {/* tabs */}
        <div className="flex gap-2 mb-5">
          {tabBtn("check", "CHECK CALLS")}
          {tabBtn("tickets", "MY TICKETS")}
          {tabBtn("fifty", "50/50")}
        </div>

        {/* ---------- CHECK TAB ---------- */}
        {tab === "check" && (
          <div>
            <div
              className="rounded-2xl p-4 mb-4"
              style={{ background: C.panel, border: "1px solid " + C.panelEdge }}
            >
              <ColorPicker value={checkColor} onChange={setCheckColor} label="Color being called" />

              <label
                htmlFor="check-input"
                className="block mt-4"
                style={{
                  fontFamily: "'Archivo', sans-serif",
                  fontWeight: 700,
                  color: C.muted,
                  fontSize: "12px",
                  letterSpacing: "1px",
                  textTransform: "uppercase",
                }}
              >
                Number being called
              </label>
              <input
                id="check-input"
                ref={checkRef}
                inputMode="numeric"
                value={checkInput}
                onChange={(e) => setCheckInput(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === "Enter") runCheck();
                }}
                placeholder="0000"
                className="w-full mt-2 rounded-xl text-center"
                style={{
                  fontFamily: "'Archivo', sans-serif",
                  fontWeight: 800,
                  fontVariantNumeric: "tabular-nums",
                  fontSize: "40px",
                  padding: "10px",
                  background: C.bg,
                  color: C.cream,
                  border: "1px solid " + C.panelEdge,
                }}
              />
              <button
                onClick={runCheck}
                disabled={tickets.length === 0}
                className="w-full mt-3 rounded-xl py-4"
                style={{
                  fontFamily: "'Bungee', sans-serif",
                  fontSize: "16px",
                  letterSpacing: "1px",
                  background: tickets.length === 0 ? C.miss : C.red,
                  color: tickets.length === 0 ? C.muted : C.cream,
                }}
              >
                CHECK
              </button>
              {tickets.length === 0 && (
                <div
                  className="text-center mt-2"
                  style={{ fontFamily: "'Archivo', sans-serif", color: C.muted, fontSize: "13px" }}
                >
                  Add your tickets first in the My Tickets tab.
                </div>
              )}
            </div>

            <ResultStub result={result} />

            {/* winners */}
            {winners.length > 0 && (
              <div className="mt-5">
                <div
                  style={{
                    fontFamily: "'Bungee', sans-serif",
                    color: C.gold,
                    fontSize: "13px",
                    letterSpacing: "1px",
                    marginBottom: "8px",
                  }}
                >
                  YOUR WINNING TICKETS
                </div>
                <div className="flex flex-wrap gap-2">
                  {winners.map((w) => (
                    <span
                      key={keyOf(w)}
                      className="rounded-lg px-3 py-1 inline-flex items-center gap-2"
                      style={{
                        background: C.gold,
                        color: "#231A02",
                        fontFamily: "'Archivo', sans-serif",
                        fontWeight: 800,
                        fontVariantNumeric: "tabular-nums",
                        fontSize: "15px",
                      }}
                    >
                      <span
                        className="rounded-full inline-block"
                        style={{
                          width: 12,
                          height: 12,
                          background: colorOf(w.c).bg,
                          border: w.c == null ? "1px dashed #9a917c" : "1px solid rgba(0,0,0,0.25)",
                        }}
                      />
                      #{w.n}
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* history */}
            {history.length > 0 && (
              <div className="mt-5">
                <div
                  style={{
                    fontFamily: "'Bungee', sans-serif",
                    color: C.muted,
                    fontSize: "13px",
                    letterSpacing: "1px",
                    marginBottom: "8px",
                  }}
                >
                  CALLED SO FAR ({history.length})
                </div>
                <div className="flex flex-wrap gap-2">
                  {history.slice(0, 40).map((h) => (
                    <span
                      key={h.id}
                      className="rounded-lg px-3 py-1 inline-flex items-center gap-1h"
                      style={{
                        background: h.hit ? C.gold : C.panel,
                        color: h.hit ? "#231A02" : C.muted,
                        border: "1px solid " + (h.hit ? C.gold : C.panelEdge),
                        fontFamily: "'Archivo', sans-serif",
                        fontWeight: 700,
                        fontVariantNumeric: "tabular-nums",
                        fontSize: "14px",
                      }}
                    >
                      <span
                        className="rounded-full inline-block"
                        style={{
                          width: 10,
                          height: 10,
                          background: colorOf(h.color).bg,
                          border: h.color == null ? "1px dashed #9a917c" : "1px solid rgba(0,0,0,0.25)",
                        }}
                      />
                      {h.num}
                    </span>
                  ))}
                  {history.length > 40 && (
                    <span
                      style={{
                        color: C.muted,
                        fontFamily: "'Archivo', sans-serif",
                        fontSize: "13px",
                        alignSelf: "center",
                      }}
                    >
                      +{history.length - 40} more
                    </span>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ---------- TICKETS TAB ---------- */}
        {tab === "tickets" && (
          <div>
            <div
              className="rounded-2xl p-4"
              style={{ background: C.panel, border: "1px solid " + C.panelEdge }}
            >
              <ColorPicker value={addColor} onChange={setAddColor} label="Ticket color" />

              <label
                htmlFor="add-input"
                className="block mt-4"
                style={{
                  fontFamily: "'Archivo', sans-serif",
                  fontWeight: 700,
                  color: C.muted,
                  fontSize: "12px",
                  letterSpacing: "1px",
                  textTransform: "uppercase",
                }}
              >
                Ticket numbers
              </label>
              <input
                id="add-input"
                value={addInput}
                onChange={(e) => setAddInput(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === "Enter") addTickets();
                }}
                placeholder="e.g. 4501-4550, 88, 1203"
                className="w-full mt-2 rounded-xl"
                style={{
                  fontFamily: "'Archivo', sans-serif",
                  fontWeight: 600,
                  fontSize: "17px",
                  padding: "14px",
                  background: C.bg,
                  color: C.cream,
                  border: "1px solid " + C.panelEdge,
                }}
              />
              <div
                className="mt-2"
                style={{ fontFamily: "'Archivo', sans-serif", color: C.muted, fontSize: "13px" }}
              >
                Mix ranges and single numbers, separated by commas or spaces. Pick the roll color above first.
              </div>
              <button
                onClick={addTickets}
                className="w-full mt-3 rounded-xl py-3"
                style={{
                  fontFamily: "'Bungee', sans-serif",
                  fontSize: "14px",
                  letterSpacing: "1px",
                  background: C.red,
                  color: C.cream,
                }}
              >
                ADD TO MY TICKETS
              </button>
              {addMsg && (
                <div
                  className="mt-2 text-center"
                  style={{ fontFamily: "'Archivo', sans-serif", color: C.gold, fontSize: "13px" }}
                >
                  {addMsg}
                </div>
              )}
            </div>

            {/* ticket list */}
            <div className="mt-5">
              <div className="flex items-center justify-between mb-2">
                <div
                  style={{
                    fontFamily: "'Bungee', sans-serif",
                    color: C.muted,
                    fontSize: "13px",
                    letterSpacing: "1px",
                  }}
                >
                  MY TICKETS ({tickets.length})
                </div>
                {tickets.length > 0 && (
                  <button
                    onClick={() => (confirmClear ? clearAll() : setConfirmClear(true))}
                    onBlur={() => setConfirmClear(false)}
                    className="rounded-lg px-3 py-1"
                    style={{
                      fontFamily: "'Archivo', sans-serif",
                      fontWeight: 700,
                      fontSize: "12px",
                      background: confirmClear ? C.red : "transparent",
                      color: confirmClear ? C.cream : C.muted,
                      border: "1px solid " + (confirmClear ? C.red : C.panelEdge),
                    }}
                  >
                    {confirmClear ? "Tap again to clear all" : "Clear all"}
                  </button>
                )}
              </div>

              {tickets.length === 0 ? (
                <div
                  className="rounded-2xl p-6 text-center"
                  style={{
                    background: C.panel,
                    border: "2px dashed " + C.panelEdge,
                    color: C.muted,
                    fontFamily: "'Archivo', sans-serif",
                  }}
                >
                  No tickets yet. Pick a color, add your numbers above, and they save on this
                  device for raffle night.
                </div>
              ) : (
                <div className="flex flex-wrap gap-2">
                  {groups.map((g, i) => {
                    const label = g.type === "range" ? g.from + "-" + g.to : "#" + g.value;
                    const count = g.type === "range" ? g.to - g.from + 1 : 1;
                    return (
                      <TicketChip
                        key={i}
                        colorId={g.c}
                        text={label}
                        extra={count > 1 ? "(" + count + ")" : null}
                        onRemove={() => removeGroup(g)}
                      />
                    );
                  })}
                </div>
              )}
            </div>

            {/* backup & restore (no account, stored as a copy-paste code) */}
            <div className="mt-5">
              <div
                style={{
                  fontFamily: "'Bungee', sans-serif",
                  color: C.muted,
                  fontSize: "13px",
                  letterSpacing: "1px",
                  marginBottom: "8px",
                }}
              >
                BACKUP &amp; RESTORE
              </div>
              <div
                className="rounded-2xl p-4"
                style={{ background: C.panel, border: "1px solid " + C.panelEdge }}
              >
                <div
                  style={{ fontFamily: "'Archivo', sans-serif", color: C.muted, fontSize: "13px" }}
                >
                  Your tickets save on this device only. Copy a backup code and keep it somewhere
                  safe so you can restore them if this browser clears its data.
                </div>
                <button
                  onClick={makeBackup}
                  disabled={tickets.length === 0}
                  className="w-full mt-3 rounded-xl py-3"
                  style={{
                    fontFamily: "'Bungee', sans-serif",
                    fontSize: "13px",
                    letterSpacing: "1px",
                    background: tickets.length === 0 ? C.miss : C.red,
                    color: tickets.length === 0 ? C.muted : C.cream,
                  }}
                >
                  COPY BACKUP CODE
                </button>
                {backupCode && (
                  <textarea
                    readOnly
                    value={backupCode}
                    onFocus={(e) => e.target.select()}
                    rows={3}
                    className="w-full mt-3 rounded-xl"
                    style={{
                      fontFamily: "monospace",
                      fontSize: "12px",
                      padding: "10px",
                      background: C.bg,
                      color: C.cream,
                      border: "1px solid " + C.panelEdge,
                      resize: "none",
                      wordBreak: "break-all",
                    }}
                  />
                )}

                <div
                  className="mt-4"
                  style={{
                    fontFamily: "'Archivo', sans-serif",
                    fontWeight: 700,
                    color: C.muted,
                    fontSize: "12px",
                    letterSpacing: "1px",
                    textTransform: "uppercase",
                  }}
                >
                  Restore from a code
                </div>
                <textarea
                  value={restoreInput}
                  onChange={(e) => setRestoreInput(e.target.value)}
                  placeholder="Paste a backup code here"
                  rows={2}
                  className="w-full mt-2 rounded-xl"
                  style={{
                    fontFamily: "monospace",
                    fontSize: "12px",
                    padding: "10px",
                    background: C.bg,
                    color: C.cream,
                    border: "1px solid " + C.panelEdge,
                    resize: "none",
                    wordBreak: "break-all",
                  }}
                />
                <button
                  onClick={restoreBackup}
                  disabled={!restoreInput.trim()}
                  className="w-full mt-2 rounded-xl py-3"
                  style={{
                    fontFamily: "'Bungee', sans-serif",
                    fontSize: "13px",
                    letterSpacing: "1px",
                    background: !restoreInput.trim() ? C.miss : C.panelEdge,
                    color: !restoreInput.trim() ? C.muted : C.cream,
                  }}
                >
                  RESTORE
                </button>
                {backupMsg && (
                  <div
                    className="mt-2 text-center"
                    style={{ fontFamily: "'Archivo', sans-serif", color: C.gold, fontSize: "13px" }}
                  >
                    {backupMsg}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* ---------- 50/50 TAB (separate draw, plain numbers) ---------- */}
        {tab === "fifty" && (
          <div>
            {/* check panel */}
            <div
              className="rounded-2xl p-4 mb-4"
              style={{ background: C.panel, border: "1px solid " + C.panelEdge }}
            >
              <label
                htmlFor="fifty-check-input"
                className="block"
                style={{
                  fontFamily: "'Archivo', sans-serif",
                  fontWeight: 700,
                  color: C.muted,
                  fontSize: "12px",
                  letterSpacing: "1px",
                  textTransform: "uppercase",
                }}
              >
                50/50 number being called
              </label>
              <input
                id="fifty-check-input"
                ref={fifty.checkRef}
                inputMode="numeric"
                value={fiftyCheckInput}
                onChange={(e) => setFiftyCheckInput(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === "Enter") runFiftyCheck();
                }}
                placeholder="0000"
                className="w-full mt-2 rounded-xl text-center"
                style={{
                  fontFamily: "'Archivo', sans-serif",
                  fontWeight: 800,
                  fontVariantNumeric: "tabular-nums",
                  fontSize: "40px",
                  padding: "10px",
                  background: C.bg,
                  color: C.cream,
                  border: "1px solid " + C.panelEdge,
                }}
              />
              <button
                onClick={runFiftyCheck}
                disabled={fifty.tickets.length === 0}
                className="w-full mt-3 rounded-xl py-4"
                style={{
                  fontFamily: "'Bungee', sans-serif",
                  fontSize: "16px",
                  letterSpacing: "1px",
                  background: fifty.tickets.length === 0 ? C.miss : C.red,
                  color: fifty.tickets.length === 0 ? C.muted : C.cream,
                }}
              >
                CHECK 50/50
              </button>
              {fifty.tickets.length === 0 && (
                <div
                  className="text-center mt-2"
                  style={{ fontFamily: "'Archivo', sans-serif", color: C.muted, fontSize: "13px" }}
                >
                  Add your 50/50 tickets below first.
                </div>
              )}
            </div>

            <ResultStub result={fifty.result} plain tag="50/50" />

            {/* 50/50 winners */}
            {fifty.winners.length > 0 && (
              <div className="mt-5">
                <div
                  style={{
                    fontFamily: "'Bungee', sans-serif",
                    color: C.gold,
                    fontSize: "13px",
                    letterSpacing: "1px",
                    marginBottom: "8px",
                  }}
                >
                  YOUR 50/50 WINS
                </div>
                <div className="flex flex-wrap gap-2">
                  {fifty.winners.map((w) => (
                    <span
                      key={keyOf(w)}
                      className="rounded-lg px-3 py-1 inline-block"
                      style={{
                        background: C.gold,
                        color: "#231A02",
                        fontFamily: "'Archivo', sans-serif",
                        fontWeight: 800,
                        fontVariantNumeric: "tabular-nums",
                        fontSize: "15px",
                      }}
                    >
                      #{w.n}
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* add 50/50 tickets */}
            <div
              className="rounded-2xl p-4 mt-5"
              style={{ background: C.panel, border: "1px solid " + C.panelEdge }}
            >
              <label
                htmlFor="fifty-add-input"
                className="block"
                style={{
                  fontFamily: "'Archivo', sans-serif",
                  fontWeight: 700,
                  color: C.muted,
                  fontSize: "12px",
                  letterSpacing: "1px",
                  textTransform: "uppercase",
                }}
              >
                Add 50/50 ticket numbers
              </label>
              <input
                id="fifty-add-input"
                value={fiftyAddInput}
                onChange={(e) => setFiftyAddInput(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === "Enter") addFifty();
                }}
                placeholder="e.g. 1201-1240, 88, 1203"
                className="w-full mt-2 rounded-xl"
                style={{
                  fontFamily: "'Archivo', sans-serif",
                  fontWeight: 600,
                  fontSize: "17px",
                  padding: "14px",
                  background: C.bg,
                  color: C.cream,
                  border: "1px solid " + C.panelEdge,
                }}
              />
              <div
                className="mt-2"
                style={{ fontFamily: "'Archivo', sans-serif", color: C.muted, fontSize: "13px" }}
              >
                The 50/50 is its own roll — these stay separate from your main raffle tickets.
              </div>
              <button
                onClick={addFifty}
                className="w-full mt-3 rounded-xl py-3"
                style={{
                  fontFamily: "'Bungee', sans-serif",
                  fontSize: "14px",
                  letterSpacing: "1px",
                  background: C.red,
                  color: C.cream,
                }}
              >
                ADD 50/50 TICKETS
              </button>
              {fiftyAddMsg && (
                <div
                  className="mt-2 text-center"
                  style={{ fontFamily: "'Archivo', sans-serif", color: C.gold, fontSize: "13px" }}
                >
                  {fiftyAddMsg}
                </div>
              )}
            </div>

            {/* 50/50 ticket list */}
            <div className="mt-5">
              <div className="flex items-center justify-between mb-2">
                <div
                  style={{
                    fontFamily: "'Bungee', sans-serif",
                    color: C.muted,
                    fontSize: "13px",
                    letterSpacing: "1px",
                  }}
                >
                  MY 50/50 TICKETS ({fifty.tickets.length})
                </div>
                {fifty.tickets.length > 0 && (
                  <button
                    onClick={() => (fiftyConfirmClear ? clearFifty() : setFiftyConfirmClear(true))}
                    onBlur={() => setFiftyConfirmClear(false)}
                    className="rounded-lg px-3 py-1"
                    style={{
                      fontFamily: "'Archivo', sans-serif",
                      fontWeight: 700,
                      fontSize: "12px",
                      background: fiftyConfirmClear ? C.red : "transparent",
                      color: fiftyConfirmClear ? C.cream : C.muted,
                      border: "1px solid " + (fiftyConfirmClear ? C.red : C.panelEdge),
                    }}
                  >
                    {fiftyConfirmClear ? "Tap again to clear 50/50" : "Clear 50/50"}
                  </button>
                )}
              </div>

              {fifty.tickets.length === 0 ? (
                <div
                  className="rounded-2xl p-6 text-center"
                  style={{
                    background: C.panel,
                    border: "2px dashed " + C.panelEdge,
                    color: C.muted,
                    fontFamily: "'Archivo', sans-serif",
                  }}
                >
                  No 50/50 tickets yet. Add your numbers above and they save on this device.
                </div>
              ) : (
                <div className="flex flex-wrap gap-2">
                  {fiftyGroups.map((g, i) => {
                    const label = g.type === "range" ? g.from + "-" + g.to : "#" + g.value;
                    const count = g.type === "range" ? g.to - g.from + 1 : 1;
                    return (
                      <TicketChip
                        key={i}
                        plain
                        colorId={g.c}
                        text={label}
                        extra={count > 1 ? "(" + count + ")" : null}
                        onRemove={() => removeFiftyGroup(g)}
                      />
                    );
                  })}
                </div>
              )}
            </div>

            {/* 50/50 history */}
            {fifty.history.length > 0 && (
              <div className="mt-5">
                <div
                  style={{
                    fontFamily: "'Bungee', sans-serif",
                    color: C.muted,
                    fontSize: "13px",
                    letterSpacing: "1px",
                    marginBottom: "8px",
                  }}
                >
                  50/50 CALLED SO FAR ({fifty.history.length})
                </div>
                <div className="flex flex-wrap gap-2">
                  {fifty.history.slice(0, 40).map((h) => (
                    <span
                      key={h.id}
                      className="rounded-lg px-3 py-1 inline-block"
                      style={{
                        background: h.hit ? C.gold : C.panel,
                        color: h.hit ? "#231A02" : C.muted,
                        border: "1px solid " + (h.hit ? C.gold : C.panelEdge),
                        fontFamily: "'Archivo', sans-serif",
                        fontWeight: 700,
                        fontVariantNumeric: "tabular-nums",
                        fontSize: "14px",
                      }}
                    >
                      {h.num}
                    </span>
                  ))}
                  {fifty.history.length > 40 && (
                    <span
                      style={{
                        color: C.muted,
                        fontFamily: "'Archivo', sans-serif",
                        fontSize: "13px",
                        alignSelf: "center",
                      }}
                    >
                      +{fifty.history.length - 40} more
                    </span>
                  )}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RaffleChecker />);
</script>
</body>
</html>
